# Purpose: Full BayesFusion-SDF config (CO3D, memory-safe)
data:
  root: data/co3d/dummy
  stride: 3
  max_frames: 150
  depth_scale: 10000.0
model:
  voxel: 0.05
  band: 0.15   # also TSDF trunc in run_ours.py
  lambda_smooth: 1.0
  lambda_anchor: 20.0
  use_anchor: true
  heteroscedastic: true
solver:
  tol: 1.0e-5
  maxiter: 150
variance:
  probes: 16
  tol: 1.0e-4
  maxiter: 200
output:
  out_dir: outputs/ours
